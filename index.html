<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 垃圾辨識系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ml5@latest/dist/ml5.min.js"></script>
<style>
body { margin: 0; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; }
#header { width: 100%; background: #2c3e50; color: white; padding: 15px; text-align: center; font-size: 1.2rem; }
#video-container { width: 90vw; max-width: 400px; height: 90vw; max-height: 400px; margin-top: 20px; border-radius: 20px; overflow: hidden; position: relative; background: #000; }
#result-card { width: 85%; max-width: 380px; background: white; margin-top: 20px; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
.label-text { font-size: 1.8rem; color: #e67e22; font-weight: bold; }
#loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
</style>
</head>
<body>
<div id="loading-screen">
<h2 id="status">正在啟動相機與模型...</h2>
<p>請確保已允許相機權限</p>
</div>

<div id="header">垃圾辨識 AI 工具</div>
<div id="video-container"></div>
<div id="result-card">
<div class="label-text" id="label">準備中...</div>
<div id="confidence">信心度: --%</div>
</div>

<script>
// 妳的模型網址
const modelURL = 'https://teachablemachine.withgoogle.com/models/m1uAKHENd/';
let classifier;
let video;

function setup() {
// 建立畫布並放入容器
let size = min(windowWidth * 0.9, 400);
let canvas = createCanvas(size, size);
canvas.parent('video-container');

// 啟動相機 (強制後鏡頭 + playsinline)
let constraints = { video: { facingMode: "environment" }, audio: false };
video = createCapture(constraints, function(stream) {
// 修正 iOS 影片不播放問題
let videoElt = document.querySelector('video');
videoElt.setAttribute('playsinline', '');
videoElt.play();

// 相機好了才載入模型
document.getElementById('status').innerText = "相機已就緒，載入模型中...";
classifier = ml5.imageClassifier(modelURL + 'model.json', video, modelLoaded);
});
video.size(size, size);
video.hide();
}

function modelLoaded() {
console.log("Model Loaded!");
document.getElementById('loading-screen').style.display = 'none';
classifyVideo();
}

function classifyVideo() {
classifier.classify(video, (error, results) => {
if (!error && results) {
document.getElementById('label').innerText = results[0].label;
document.getElementById('confidence').innerText = "信心度: " + (results[0].confidence * 100).toFixed(1) + "%";
}
classifyVideo();
});
}

function draw() {
image(video, 0, 0, width, height);
}
</script>
</body>
</html>
